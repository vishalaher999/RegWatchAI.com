[pytest]
markers =
    slow: marks tests as slow integration tests that hit live network (deselect with -m "not slow")
    eval: marks tests as RAGAS quality gate — runs against golden set, requires summaries in DB

# Default: exclude slow and eval tests. Run all with: pytest -m ""
# Run CI gate: pytest -m eval -v
addopts = -m "not slow and not eval"
